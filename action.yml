name: 'Terraform Scaffold AI'
description: 'Generate a Terraform scaffold from a natural-language architecture description'
author: 'JamesIOmete'

branding:
  icon: 'code'
  color: 'purple'

inputs:
  description:
    description: 'Plain-language description of the desired cloud architecture'
    required: true
  cloud:
    description: 'Target cloud provider: aws, azure, gcp, or multi'
    required: false
    default: 'aws'
  output-path:
    description: 'Workspace-relative path to write the generated scaffold'
    required: false
    default: 'out/scaffold'
  openai-api-key:
    description: 'OpenAI API key (mutually exclusive with azure-openai-* inputs)'
    required: false
    default: ''
  azure-openai-endpoint:
    description: 'Azure OpenAI endpoint URL'
    required: false
    default: ''
  azure-openai-key:
    description: 'Azure OpenAI API key'
    required: false
    default: ''
  azure-openai-deployment:
    description: 'Azure OpenAI deployment name'
    required: false
    default: 'gpt-4o'
  model:
    description: 'OpenAI model name'
    required: false
    default: 'gpt-4o'
  github-token:
    description: 'GitHub token (used to post scaffold summary as workflow summary)'
    required: true
    default: '${{ github.token }}'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Generate Terraform scaffold
      shell: bash
      run: >
        python -m scaffolder.scaffold
        --description "${{ inputs.description }}"
        --cloud "${{ inputs.cloud }}"
        --output "$GITHUB_WORKSPACE/${{ inputs.output-path }}"
      working-directory: ${{ github.action_path }}
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        AZURE_OPENAI_ENDPOINT: ${{ inputs.azure-openai-endpoint }}
        AZURE_OPENAI_KEY: ${{ inputs.azure-openai-key }}
        AZURE_OPENAI_DEPLOYMENT: ${{ inputs.azure-openai-deployment }}
        MODEL: ${{ inputs.model }}

    - name: Upload scaffold as artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-scaffold
        path: ${{ inputs.output-path }}
